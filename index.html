const RANKING_DATA = 'data/mens-rankings.json';
const REMAIN_DATA = 'data/remaining.txt';

const tbodyA = document.getElementById('tbodyA');
const tbodyB = document.getElementById('tbodyB');

async function loadData() {
  try {
    const rankingResult = await fetch(RANKING_DATA);
    const rankingJson = await rankingResult.json();
    const remainResult = await fetch(REMAIN_DATA);
    const remainText = await remainResult.text();
    const remainList = remainText.split('\n');
    console.log(remainList)
    renderRows(rankingJson.Results || [], remainList || []);
  } catch (err) {
    console.error('Failed to load data:', err);
    tbodyA.innerHTML = '<tr><td colspan="2">Failed to load data.</td></tr>';
  }
}

function getFlagEmoji(iso2Code) {
  return iso2Code.toUpperCase().replace(/./g, char => 
    String.fromCodePoint(char.charCodeAt(0) + 127397)
  );
}

function renderRows(teams, remaining) {
  tbodyA.innerHTML = '';
  tbodyB.innerHTML = '';
  let remainCount = 1;

  teams.forEach(function (t, i) {
    console.log(i)
    const trB = document.createElement('tr');
    const teamId = t.IdCountry
    // And emoji from id
    const teamName = t.TeamName[0].Description
    const teamISO2 = countryISOMapping[teamId] || '';
    const teamEmoji = getFlagEmoji(teamISO2) || customEmojis[teamName] || '';
    // console.log(countryId)
    trB.dataset.id = t.IdCountry
    // Table contents
    const teamRank = t.Rank
    const teamPoints = t.TotalPoints
    // console.log(`${teamName}: ${teamISO2}, ${teamEmoji}`)
    trB.innerHTML =
      '<td class="text-end">' + teamRank + '</td>' +
      '<td>' + teamEmoji + ' ' + teamName + '</td>' +
      '<td class="text-end">' + teamPoints.toFixed(2) + '</td>'
      
    tbodyB.appendChild(trB);

    // Remaining teams
    if (remaining.indexOf(teamName) >= 0) {
      const trA = document.createElement('tr');
      trA.dataset.id = t.IdCountry;
      trA.innerHTML =
      '<td class="text-end">' + teamRank + '</td>' +
      // '<td>' + remainCount + '. ' + teamEmoji + ' ' + teamName + '</td>' +
      '<td>' + teamEmoji + ' ' + teamName + '</td>' +
      '<td class="text-end">' + teamPoints.toFixed(2) + '</td>'
      tbodyA.appendChild(trA);
      remainCount = remainCount + 1
    }
  });

  scheduleDraw();
}

// --- Connector drawing logic ---
const svg = document.getElementById('connector');
const containerA = document.getElementById('tableA');
const containerB = document.getElementById('tableB');

function drawLines() {
  svg.innerHTML = '';
  const svgRect = svg.getBoundingClientRect();
  const rowsA = tbodyA.querySelectorAll('tr');
  const boxA = containerA.getBoundingClientRect();
  const boxB = containerB.getBoundingClientRect();

  rowsA.forEach(function (rowA) {
    const rowB = tbodyB.querySelector('tr[data-id="' + rowA.dataset.id + '"]');
    if (!rowB) return;

    const rA = rowA.getBoundingClientRect();
    const rB = rowB.getBoundingClientRect();

    // Skip rows that have scrolled out of view in either table
    if ((rA.bottom - 80) < boxA.top) return;
    if (rA.top > boxA.bottom) return;
    // if (rB.bottom < boxB.top || rB.top > boxB.bottom) return;

    const y1 = rA.top + rA.height / 2 - svgRect.top;
    const y2 = rB.top + rB.height / 2 - svgRect.top;
    const x1 = rA.right - svgRect.left;
    const x2 = rB.left - svgRect.left;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const midX = (x1 + x2) / 2;
    path.setAttribute(
      'd',
      'M ' + x1 + ' ' + y1 +
      ' C ' + midX + ' ' + y1 + ', ' + midX + ' ' + y2 + ', ' + x2 + ' ' + y2
    );
    path.setAttribute('stroke', '#888');
    path.setAttribute('stroke-width', '1');
    path.setAttribute('fill', 'none');
    svg.appendChild(path);
  });
}

let raf = null;
function scheduleDraw() {
  if (raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(drawLines);
}

containerA.addEventListener('scroll', scheduleDraw);
containerB.addEventListener('scroll', scheduleDraw);
window.addEventListener('resize', scheduleDraw);
setTimeout(drawLines, 100);
